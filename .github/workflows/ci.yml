name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check host system
        run: nix flake check --print-build-logs

      - name: Check all system evaluations
        run: nix flake check --all-systems --no-build

      - name: Smoke version
        run: |
          version="$(nix eval --raw .#packages.x86_64-linux.default.version)"
          output="$(nix run . -- --version)"
          test "$output" = "metastack $version"

      - name: Smoke help
        run: nix run . -- --help | grep -q "Structured send"

      - name: Verify release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(nix eval --raw .#packages.x86_64-linux.default.version)"
          test "$GITHUB_REF_NAME" = "v$version"
