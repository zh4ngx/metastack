# Portable default DAG config for `metastack` with no CLI args.
# Run from inside zellij with `zellij-mcp` on PATH, or set `mcp_binary` below.
mcp_binary: zellij-mcp
startup_delay: 0.2
poll_interval: 0.2
timeout: 10
providers:
  shell:
    command: [sh]
    prompt_mode: shell
    capacity: 1
    refill_per_sec: 1
tasks:
  - name: hello
    provider: shell
    prompt: echo hello from metastack
