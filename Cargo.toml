[package]
name = "metastack"
version = "0.1.0"
edition = "2024"
description = "Tiny DAG orchestrator over zellij-mcp — Rust/WASI v0"
license = "MIT"

[[bin]]
name = "metastack"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "io-util", "time", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yml = "0.0.12"
anyhow = "1"
uuid = { version = "1", features = ["v4"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
