# Example structured-send routing config.
# This file is not runnable as-is: replace Andy-local target names, project
# roots, member names, ports, and security policy before using it.

version: 2

backends:
  opencode:
    type: opencode
    base_url: http://127.0.0.1:4096

  codex:
    type: codex
    url: ws://127.0.0.1:4107
    model: gpt-5.5
    effort: xhigh
    # Local trusted-agent default only. Use stricter policy for untrusted work.
    approval_policy: never
    sandbox_policy:
      type: dangerFullAccess

  huddle:
    type: claude
    command: huddle
agents:
  vault-oc:
    backend: opencode
    cwd: /home/andy/vault

  nixos-cx:
    backend: codex
    cwd: /home/andy/nixos

  andy-coh:
    backend: huddle
    member: andy
